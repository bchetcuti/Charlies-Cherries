<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Chef Certificate | Charlies Cherries</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="print-page certificate-page">
  <main class="certificate-sheet" aria-labelledby="certificate-title">
    <div class="certificate-border">
      <img class="print-logo" src="/assets/img/cherry-logo.svg" alt="" width="104" height="104">
      <p class="eyebrow">Official certificate</p>
      <h1 id="certificate-title">Founder & Head Chef</h1>
      <p class="certificate-intro">This certifies that</p>
      <p class="certificate-name">Charlie</p>
      <p class="certificate-copy">is the Founder, Head Chef and Menu Boss of <strong>Charlies Cherries</strong>, the world-famous carpark restaurant for ribs, wings, lasagne and big ideas.</p>
      <div class="certificate-signatures">
        <div>
          <span></span>
          <p>Family Approval</p>
        </div>
        <div>
          <span></span>
          <p>Five Cherries Rating</p>
        </div>
      </div>
      <p class="certificate-seal">★★★★★</p>
    </div>
    <div class="screen-actions">
      <a class="button button-secondary" href="/">Back to website</a>
      <button class="button button-primary" type="button" data-print>Print certificate</button>
    </div>
  </main>
  <script src="/assets/js/app.js" defer></script>
</body>
</html>
