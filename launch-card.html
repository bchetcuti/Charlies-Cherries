<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Grand Opening Card | Charlies Cherries</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body class="print-page launch-card-page">
  <main class="certificate-sheet launch-card-sheet" aria-labelledby="launch-title">
    <div class="certificate-border launch-card-border">
      <img class="print-logo" src="/assets/img/cherry-logo.svg" alt="" width="96" height="96">
      <p class="eyebrow">Grand opening invitation</p>
      <h1 id="launch-title">Charlies Cherries</h1>
      <p class="print-subtitle">Tiny boss. Big flavour.</p>
      <p class="certificate-copy">You are officially invited to visit Chef Charlie’s world-famous carpark restaurant.</p>
      <figure class="qr-frame">
        <img class="qr-code" src="/assets/img/qr.png" alt="QR code to visit Charlies Cherries" width="280" height="280" data-qr-image>
        <figcaption>Scan to visit the restaurant website</figcaption>
        <div class="qr-placeholder" data-qr-fallback hidden>
          <span>Add <code>/assets/img/qr.png</code> to show the QR code here</span>
        </div>
      </figure>
      <p class="print-note"><strong>Opening special:</strong> BBQ pork ribs, chicken wings, lasagne and very important dessert decisions.</p>
    </div>
    <div class="screen-actions">
      <a class="button button-secondary" href="/">Back to website</a>
      <button class="button button-primary" type="button" data-print>Print launch card</button>
    </div>
  </main>
  <script src="/assets/js/app.js" defer></script>
</body>
</html>
